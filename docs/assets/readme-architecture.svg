<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10V0Z" fill="#6366F1"/>
    </marker>
    <style>
      .title { font: 700 30px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #0F172A; }
      .subtitle { font: 500 15px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #475569; }
      .laneTitle { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #1E293B; }
      .boxTitle { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #0F172A; }
      .boxText { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #334155; }
      .chip { font: 600 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #312E81; }
      .small { font: 600 12px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #4338CA; }
      .artifact { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #111827; }
      .muted { font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; fill: #64748B; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="24" fill="url(#bg)"/>

  <text x="56" y="64" class="title">Codex Self-Evolution Architecture</text>
  <text x="56" y="92" class="subtitle">Codex-first, Hermes-inspired • self-evolving collaboration loop</text>

  <rect x="48" y="132" width="1104" height="240" rx="24" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
  <text x="72" y="170" class="laneTitle">Runtime loop</text>

  <rect x="72" y="206" width="220" height="118" rx="20" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="96" y="242" class="boxTitle">SessionStart</text>
  <text x="96" y="268" class="boxText">Inject stable background</text>
  <text x="96" y="290" class="boxText">Load memory + recall policy</text>
  <text x="96" y="312" class="boxText">Prepare repo runtime state</text>

  <rect x="348" y="206" width="220" height="118" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="372" y="242" class="boxTitle">Live work in Codex</text>
  <text x="372" y="268" class="boxText">Normal coding session</text>
  <text x="372" y="290" class="boxText">Task execution + tool use</text>
  <text x="372" y="312" class="boxText">Context accumulates</text>

  <rect x="624" y="206" width="220" height="118" rx="20" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="648" y="242" class="boxTitle">Stop review</text>
  <text x="648" y="268" class="boxText">Normalize session snapshot</text>
  <text x="648" y="290" class="boxText">Run provider-backed reviewer</text>
  <text x="648" y="312" class="boxText">Produce suggestion envelope</text>

  <rect x="900" y="206" width="220" height="118" rx="20" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="924" y="242" class="boxTitle">Compile / promote</text>
  <text x="924" y="268" class="boxText">Claim pending suggestions</text>
  <text x="924" y="290" class="boxText">Merge with existing assets</text>
  <text x="924" y="312" class="boxText">Write final managed artifacts</text>

  <path d="M292 265H348" stroke="#6366F1" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M568 265H624" stroke="#6366F1" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M844 265H900" stroke="#6366F1" stroke-width="4" marker-end="url(#arrow)"/>

  <path d="M1010 330V360C1010 390 986 414 956 414H234C204 414 180 438 180 468V494" stroke="#6366F1" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="852" y="397" class="small">better starting point for next session</text>

  <rect x="48" y="404" width="1104" height="292" rx="24" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
  <text x="72" y="442" class="laneTitle">Promotion pipeline and durable artifacts</text>

  <rect x="72" y="474" width="260" height="170" rx="20" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="96" y="510" class="boxTitle">Review + scheduling layer</text>
  <text x="96" y="538" class="boxText">Reviewer extracts structured signals</text>
  <text x="96" y="562" class="boxText">Scheduler / scan drains repo buckets</text>
  <text x="96" y="586" class="boxText">Compile preflight skips empty or locked work</text>
  <rect x="96" y="604" width="100" height="24" rx="12" fill="#E0E7FF"/>
  <text x="114" y="620" class="chip">reviewer</text>
  <rect x="206" y="604" width="84" height="24" rx="12" fill="#EDE9FE"/>
  <text x="225" y="620" class="chip">scan</text>

  <rect x="380" y="474" width="284" height="170" rx="20" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="404" y="510" class="boxTitle">Compiler</text>
  <text x="404" y="538" class="boxText">Only writer of final assets</text>
  <text x="404" y="562" class="boxText">Merges suggestions with current memory / recall</text>
  <text x="404" y="586" class="boxText">Supports script backend and agent backend</text>
  <rect x="404" y="604" width="84" height="24" rx="12" fill="#E0E7FF"/>
  <text x="423" y="620" class="chip">script</text>
  <rect x="498" y="604" width="130" height="24" rx="12" fill="#EDE9FE"/>
  <text x="514" y="620" class="chip">agent:opencode</text>

  <rect x="712" y="474" width="392" height="170" rx="20" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="736" y="510" class="boxTitle">Durable artifacts</text>

  <rect x="736" y="530" width="160" height="40" rx="14" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="758" y="555" class="artifact">USER.md / MEMORY.md</text>

  <rect x="912" y="530" width="160" height="40" rx="14" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="951" y="555" class="artifact">recall index</text>

  <rect x="736" y="586" width="160" height="40" rx="14" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="775" y="611" class="artifact">managed skills</text>

  <rect x="912" y="586" width="160" height="40" rx="14" fill="#FFFFFF" stroke="#FCD34D"/>
  <text x="954" y="611" class="artifact">receipts / snapshots</text>

  <path d="M332 559H380" stroke="#6366F1" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M664 559H712" stroke="#6366F1" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="72" y="724" class="muted">Hooks feed review. Review feeds compilation. Compilation promotes durable artifacts. Those artifacts shape the next Codex session.</text>
</svg>
